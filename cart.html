<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagVerse | Checkout Premium</title>
    <script>
        (function() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { indigo: { 600: '#4f46e5' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        html.dark body { background-color: #0f172a; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 dark:text-white transition-all min-h-screen">
    
    <nav class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md sticky top-0 z-50 border-b dark:border-gray-800 shadow-sm font-bold">
        <div class="container mx-auto px-2 py-3 md:px-4 md:py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-black text-indigo-600 cursor-pointer tracking-tighter shrink-0 mr-2" onclick="location.href='index.html'">
                BAGVERSE.
            </h1>
            <div class="flex items-center gap-2 sm:gap-4 md:gap-6 text-[9px] xs:text-[10px] md:text-sm">
                <a href="index.html" class="opacity-60 hover:opacity-100 transition whitespace-nowrap">Beranda</a>
                <a href="wishlist.html" class="opacity-60 hover:opacity-100 transition"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:inline-block;vertical-align:middle;"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></a>
                <a href="history.html" onclick="goHistory(event)" class="opacity-60 hover:opacity-100 transition whitespace-nowrap">Riwayat</a>
                <a href="cart.html" class="text-indigo-600 border-b-2 border-indigo-600 whitespace-nowrap relative text-base md:text-xl shrink-0 ml-1">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:middle;"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> <span id="cart-count" class="absolute -top-1 -right-2 bg-red-500 text-white text-[8px] px-1 rounded-full font-bold border border-white dark:border-gray-800">0</span>
                </a>
                <div id="nav-auth" class="shrink-0"></div>
                <button onclick="toggleTheme()" class="p-1.5 md:p-2 bg-gray-100 dark:bg-gray-700 rounded-lg md:rounded-xl text-xs">🌓</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 md:py-10 max-w-6xl">
        <div class="grid lg:grid-cols-3 gap-6 md:gap-10">
            
            <div class="lg:col-span-2 space-y-6 md:space-y-8">
                <section>
                    <h2 class="text-xl md:text-2xl font-black mb-4 md:mb-6 tracking-tight">Review Barang</h2>
                    <div id="cart-list" class="space-y-3 md:space-y-4"></div>
                </section>

                <section class="bg-white dark:bg-gray-800 p-5 md:p-8 rounded-[24px] md:rounded-[32px] border dark:border-gray-700 shadow-sm">
                    <h2 class="text-lg md:text-xl font-black mb-4 md:mb-6">Informasi Pengiriman</h2>
                    <div class="grid md:grid-cols-2 gap-3 md:gap-4 font-bold">
                        <div class="space-y-1">
                            <label class="text-[9px] md:text-[10px] opacity-40 uppercase ml-1">Nama Lengkap</label>
                            <input type="text" id="co-name" placeholder="Dewi.." class="w-full p-3 rounded-xl border dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-2 focus:ring-indigo-500 text-xs md:text-sm">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] md:text-[10px] opacity-40 uppercase ml-1">Nomor WhatsApp</label>
                            <input type="tel" id="co-phone" placeholder="0812xxxx" class="w-full p-3 rounded-xl border dark:bg-gray-700 dark:border-gray-600 outline-none text-xs md:text-sm">
                        </div>
                        <div class="md:col-span-2 space-y-1">
                            <label class="text-[9px] md:text-[10px] opacity-40 uppercase ml-1">Alamat Lengkap</label>
                            <textarea id="co-address" placeholder="Jalan, No Rumah, Kec, Kota/Kab" class="w-full p-3 rounded-xl border dark:bg-gray-700 dark:border-gray-600 h-20 md:h-24 outline-none text-xs md:text-sm"></textarea>
                        </div>
                    </div>

                    <div class="mt-5 md:mt-6">
                        <label class="text-[9px] md:text-[10px] font-black opacity-40 uppercase ml-1">Pilih Ekspedisi</label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-3 mt-2">
                            <label class="cursor-pointer">
                                <input type="radio" name="shipping" value="20000" class="hidden peer" checked onchange="updateTotal()">
                                <div class="p-2 md:p-3 border rounded-xl text-center peer-checked:border-indigo-600 peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-900/30 transition">
                                    <p class="font-bold text-[10px] md:text-xs uppercase">J&T Reg</p>
                                    <p class="text-[9px] md:text-[10px] opacity-50">Rp 20rb</p>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="shipping" value="15000" class="hidden peer" onchange="updateTotal()">
                                <div class="p-2 md:p-3 border rounded-xl text-center peer-checked:border-indigo-600 peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-900/30 transition">
                                    <p class="font-bold text-[10px] md:text-xs uppercase">Sicepat</p>
                                    <p class="text-[9px] md:text-[10px] opacity-50">Rp 15rb</p>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="shipping" value="25000" class="hidden peer" onchange="updateTotal()">
                                <div class="p-2 md:p-3 border rounded-xl text-center peer-checked:border-indigo-600 peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-900/30 transition">
                                    <p class="font-bold text-[10px] md:text-xs uppercase">JNE YES</p>
                                    <p class="text-[9px] md:text-[10px] opacity-50">Rp 25rb</p>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="shipping" value="0" class="hidden peer" onchange="updateTotal()">
                                <div class="p-2 md:p-3 border rounded-xl text-center peer-checked:border-indigo-600 peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-900/30 transition">
                                    <p class="font-bold text-[10px] md:text-xs uppercase">Ambil</p>
                                    <p class="text-[9px] md:text-[10px] opacity-50">Gratis</p>
                                </div>
                            </label>
                        </div>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-white dark:bg-gray-800 p-6 md:p-8 rounded-[24px] md:rounded-[32px] shadow-xl border dark:border-gray-700 sticky top-24 space-y-4 md:space-y-6">
                    <h3 class="text-lg md:text-xl font-black">Ringkasan Biaya</h3>
                    
                    <div class="space-y-2 md:space-y-3 text-xs md:text-sm border-b dark:border-gray-700 pb-4">
                        <div class="flex justify-between opacity-50 font-bold">
                            <span>Subtotal Barang</span>
                            <span id="subtotal-display">Rp 0</span>
                        </div>
                        <div class="flex justify-between opacity-50 font-bold">
                            <span>Ongkos Kirim</span>
                            <span id="shipping-display">Rp 20.000</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-center">
                        <span class="font-bold text-sm md:text-base">Total Bayar</span>
                        <span id="grand-total" class="text-xl md:text-2xl font-black text-indigo-600">Rp 0</span>
                    </div>

                    <div class="space-y-2">
                        <p class="text-[9px] md:text-[10px] font-black opacity-40 uppercase">Metode Pembayaran</p>
                        <select id="pay-method" class="w-full p-3 rounded-xl border dark:bg-gray-700 dark:border-gray-600 font-bold text-xs md:text-sm outline-none">
                            <option value="QRIS">QRIS / E-Wallet</option>
                            <option value="BCA">Transfer BCA</option>
                            <option value="COD">Bayar di Tempat (COD)</option>
                        </select>
                    </div>

                    <button onclick="handleCheckout()" id="pay-btn" class="w-full bg-indigo-600 text-white py-3.5 md:py-4 rounded-xl md:rounded-2xl font-black text-sm md:text-lg hover:bg-indigo-700 transition-all active:scale-95 shadow-lg shadow-indigo-500/20">
                        Konfirmasi Pembayaran
                    </button>
                    
                    <p class="text-[8px] md:text-[10px] text-center opacity-40 leading-tight px-2">Dengan mengonfirmasi, Anda setuju dengan syarat & ketentuan BagVerse.</p>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-40 opacity-0 transition-all duration-500"></div>

    <script type="module">
        import { Store, showToast } from './app.js';
        Store.initTheme();

        let cart = Store.getCart();

        function render() {
            const container = document.getElementById('cart-list');
            updateNav();

            if(cart.length === 0) {
                container.innerHTML = `
                    <div class="p-12 text-center bg-white dark:bg-gray-800 rounded-[24px] border dark:border-gray-700 opacity-40 font-bold text-xs">
                        <p class="text-3xl mb-2">🛒</p>
                        Keranjangmu kosong.
                    </div>`;
                document.getElementById('pay-btn').disabled = true;
                document.getElementById('pay-btn').classList.add('opacity-50', 'cursor-not-allowed');
                return;
            }

            container.innerHTML = cart.map(i => `
                <div class="bg-white dark:bg-gray-800 p-3 md:p-4 rounded-[20px] md:rounded-[24px] flex items-center gap-3 md:gap-4 border dark:border-gray-700 shadow-sm">
                    <img src="${i.image}" onerror="this.src='https://placehold.co/100x100'" class="w-16 h-16 md:w-20 md:h-20 object-cover rounded-xl md:rounded-2xl">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-[11px] md:text-sm leading-tight truncate">${i.name}</h4>
                        <p class="text-indigo-600 font-black text-[10px] md:text-xs mt-1">Rp ${i.price.toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex items-center gap-2 md:gap-3 bg-gray-100 dark:bg-gray-700 rounded-lg md:rounded-xl p-1.5 md:p-2">
                        <button onclick="qty(${i.id}, -1)" class="w-5 md:w-6 font-black text-xs md:text-base">-</button>
                        <span class="font-black text-xs md:text-sm">${i.qty}</span>
                        <button onclick="qty(${i.id}, 1)" class="w-5 md:w-6 font-black text-xs md:text-base">+</button>
                    </div>
                </div>
            `).join('');
            updateTotal();
        }

        window.updateTotal = () => {
            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const shippingRadio = document.querySelector('input[name="shipping"]:checked');
            const shipping = shippingRadio ? parseInt(shippingRadio.value) : 0;
            const grandTotal = subtotal + shipping;

            document.getElementById('subtotal-display').innerText = `Rp ${subtotal.toLocaleString('id-ID')}`;
            document.getElementById('shipping-display').innerText = shipping === 0 ? 'Gratis' : `Rp ${shipping.toLocaleString('id-ID')}`;
            document.getElementById('grand-total').innerText = `Rp ${grandTotal.toLocaleString('id-ID')}`;
        };

        window.qty = (id, d) => {
            const item = cart.find(x => x.id === id);
            if(item) {
                item.qty += d;
                if(item.qty < 1) cart = cart.filter(x => x.id !== id);
                Store.saveCart(cart); render();
            }
        };

        window.handleCheckout = async () => {
            const user = Store.getUser();
            const name = document.getElementById('co-name').value.trim();
            const phone = document.getElementById('co-phone').value.trim();
            const address = document.getElementById('co-address').value.trim();
            const btn = document.getElementById('pay-btn');

            if(!user) {
                // Cart tetap tersimpan di localStorage — setelah login balik ke cart
                showToast("Harap login terlebih dahulu!");
                setTimeout(() => window.location.href = 'login.html?redirect=cart.html', 1200);
                return;
            }
            if(!name || !phone || !address) return showToast("Lengkapi data pengiriman!");
            if(cart.length === 0) return showToast("Keranjang masih kosong!");

            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse italic">Memproses...</span>`;

            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const shippingRadio = document.querySelector('input[name="shipping"]:checked');
            const shipping = shippingRadio ? parseInt(shippingRadio.value) : 0;
            const courierLabels = { '20000': 'J&T Reg', '15000': 'Sicepat', '25000': 'JNE YES', '0': 'Ambil Sendiri' };
            const courierName = courierLabels[String(shipping)] || 'J&T Reg';
            const payMethod = document.getElementById('pay-method').value;

            // Fungsi buat WA link - dipanggil di semua path
            const buatWALink = (orderId) => {
                const itemList = cart.map(i => `• ${i.name} x${i.qty} - Rp ${(i.price * i.qty).toLocaleString('id-ID')}`).join('\n');
                const msg = `🛍️ *PESANAN BARU - BAGVERSE*\n\n` +
                    `📦 Order ID: *${orderId}*\n` +
                    `🕐 ${new Date().toLocaleString('id-ID')}\n\n` +
                    `👤 *Customer:* ${user.name || name}\n` +
                    `📱 HP: ${phone}\n\n` +
                    `📋 *Item:*\n${itemList}\n\n` +
                    `📍 *Pengiriman:*\n${name}\n${address}\n${courierName}\n\n` +
                    `💳 Bayar: ${payMethod}\n` +
                    `💰 *Total: Rp ${(subtotal + shipping).toLocaleString('id-ID')}*\n\n` +
                    `Mohon dikonfirmasi segera 🙏`;
                return `https://wa.me/6285863437122?text=${encodeURIComponent(msg)}`;
            };

            const simpanLokal = (orderId) => {
                const localOrder = {
                    orderId, order_id: orderId, userEmail: user.email,
                    shipping: { name, phone, address, cost: shipping },
                    payment: payMethod, items: [...cart],
                    totalPrice: subtotal + shipping,
                    date: new Date().toLocaleString('id-ID'), status: 'Dibayar'
                };
                const all = Store.getOrders();
                all.push(localOrder);
                Store.saveOrders(all);
                Store.saveCart([]);
            };

            const redirectWA = (orderId) => {
                simpanLokal(orderId);
                showToast("🎉 Pesanan Berhasil! Membuka WhatsApp...");
                setTimeout(() => { window.location.href = buatWALink(orderId); }, 1500);
            };

            try {
                // Coba kirim ke API
                const orderData = {
                    items: cart.map(i => ({ product_id: i.id, name: i.name, image: i.image || '', qty: i.qty, price: i.price })),
                    shipping_name: name, shipping_phone: phone, shipping_address: address,
                    shipping_courier: courierName, shipping_cost: shipping,
                    payment_method: payMethod, subtotal, total_price: subtotal + shipping
                };

                const result = await Store.apiCheckout(orderData);

                if (result.ok && result.data.success) {
                    redirectWA(result.data.data.order_id);
                } else {
                    // API gagal → fallback lokal, tetap redirect WA
                    console.warn('API checkout gagal, pakai fallback:', result.data?.message);
                    redirectWA('BVR-' + Date.now());
                }
            } catch (err) {
                // Error apapun → tetap redirect WA
                console.error('Checkout error:', err);
                redirectWA('BVR-' + Date.now());
            }
        };

        window.toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        function updateNav() {
            document.getElementById('cart-count').innerText = Store.getCart().length;
            const user = Store.getUser() || JSON.parse(localStorage.getItem('admin_session'));
            const navAuth = document.getElementById('nav-auth');
            if (user) {
                const initial = user.name ? user.name.charAt(0).toUpperCase() : '?';
                const logoutBtn = `<button onclick="logout()" title="Logout" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;opacity:0.7;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>`;
                if (user.role === 'admin') {
                    navAuth.innerHTML = `
                        <div class="flex items-center gap-1.5">
                            <span class="hidden md:inline" style="font-size:10px;font-weight:800;opacity:0.5;">Hi, ${user.name}</span>
                            <span class="md:hidden w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-black" style="font-size:10px;min-width:24px;">${initial}</span>
                            <a href="admin/index.html" class="bg-indigo-600 text-white px-2 py-1 rounded-md font-black" style="font-size:9px;">Dashboard</a>
                            ${logoutBtn}
                        </div>`;
                } else {
                    navAuth.innerHTML = `
                        <div class="flex items-center gap-1.5">
                            <span class="hidden md:inline" style="font-size:10px;font-weight:800;opacity:0.5;">Hi, ${user.name}</span>
                            <span class="md:hidden w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-black" style="font-size:10px;min-width:24px;">${initial}</span>
                            ${logoutBtn}
                        </div>`;
                }
            } else {
                navAuth.innerHTML = `<a href="login.html" class="bg-indigo-600 text-white px-2 py-1 rounded-md font-black" style="font-size:9px;">Login</a>`;
            }
        }

        window.logout = Store.logout;
        window.goHistory = (e) => {
            e.preventDefault();
            if (Store.getUser()) window.location.href = 'history.html';
            else window.location.href = 'login.html?redirect=history.html';
        };
        render();
    </script>

    <div id="footer-placeholder"></div>

<script>
    // Fungsi panggil file footer eksternal
    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
</script>

</body>
</html>
