<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagVerse | Login</title>
    <script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');})();</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{indigo:{600:'#4f46e5'}}}}}</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .toast-in { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn { from{transform:translate(-50%,20px);opacity:0} to{transform:translate(-50%,0);opacity:1} }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center min-h-screen p-4 transition-colors duration-300">

    <!-- Tombol Toggle Dark Mode -->
    <button onclick="toggleTheme()" class="fixed top-4 right-4 p-2 bg-white dark:bg-gray-700 rounded-xl shadow-md text-sm z-50 transition hover:scale-110 active:scale-95" title="Ganti tema">🌓</button>

    <div class="bg-white dark:bg-gray-800 p-6 md:p-10 rounded-[32px] md:rounded-[40px] shadow-xl w-full max-w-[360px] md:max-w-md border dark:border-gray-700">

        <!-- Logo -->
        <h1 class="text-2xl md:text-3xl font-black text-indigo-600 text-center mb-6 italic tracking-tighter cursor-pointer" onclick="location.href='index.html'">BAGVERSE.</h1>

        <!-- Tab Switcher -->
        <div class="flex bg-gray-100 dark:bg-gray-700 p-1 rounded-2xl mb-8">
            <button id="tab-customer-btn" onclick="switchTab('customer')"
                class="flex-1 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all duration-200 bg-white dark:bg-gray-600 text-indigo-600 dark:text-white shadow-sm">
                👤 Customer
            </button>
            <button id="tab-admin-btn" onclick="switchTab('admin')"
                class="flex-1 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all duration-200 text-gray-400 dark:text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                🔒 Admin
            </button>
        </div>

        <!-- ===== PANEL CUSTOMER ===== -->
        <div id="panel-customer" class="tab-panel active">
            <form id="customer-form" class="space-y-3 md:space-y-4">
                <div>
                    <label class="text-[9px] md:text-[10px] font-black opacity-40 ml-2 uppercase tracking-widest dark:text-white">Email</label>
                    <input type="email" id="c-email" required placeholder="name@mail.com"
                        class="w-full p-3 md:p-4 rounded-xl md:rounded-2xl bg-gray-50 dark:bg-gray-700 dark:text-white border-none outline-none focus:ring-2 focus:ring-indigo-600 transition text-sm mt-1">
                </div>
                <div>
                    <label class="text-[9px] md:text-[10px] font-black opacity-40 ml-2 uppercase tracking-widest dark:text-white">Password</label>
                    <input type="password" id="c-password" required placeholder="••••••••"
                        class="w-full p-3 md:p-4 rounded-xl md:rounded-2xl bg-gray-50 dark:bg-gray-700 dark:text-white border-none outline-none focus:ring-2 focus:ring-indigo-600 transition text-sm mt-1">
                </div>
                <div class="pt-2">
                    <button type="submit" id="c-btn" class="w-full bg-indigo-600 text-white py-3.5 md:py-4 rounded-xl md:rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-700 transition active:scale-95 shadow-lg shadow-indigo-500/20 text-xs md:text-sm">
                        Masuk
                    </button>
                </div>
            </form>
            <p class="text-center mt-5 text-[10px] md:text-xs font-bold opacity-50 dark:text-white">
                Belum punya akun? <a href="register.html" class="text-indigo-600 underline">Daftar</a>
            </p>
        </div>

        <!-- ===== PANEL ADMIN ===== -->
        <div id="panel-admin" class="tab-panel">
            <form id="admin-form" class="space-y-3 md:space-y-4">
                <div>
                    <label class="text-[9px] md:text-[10px] font-black opacity-40 ml-2 uppercase tracking-widest dark:text-white">Email Admin</label>
                    <input type="email" id="a-email" placeholder="admin@mail.com"
                        class="w-full p-3 md:p-4 rounded-xl md:rounded-2xl bg-gray-50 dark:bg-gray-700 dark:text-white border-none outline-none focus:ring-2 focus:ring-indigo-600 transition text-sm mt-1">
                </div>
                <div>
                    <label class="text-[9px] md:text-[10px] font-black opacity-40 ml-2 uppercase tracking-widest dark:text-white">Password</label>
                    <input type="password" id="a-password" placeholder="••••••••"
                        class="w-full p-3 md:p-4 rounded-xl md:rounded-2xl bg-gray-50 dark:bg-gray-700 dark:text-white border-none outline-none focus:ring-2 focus:ring-indigo-600 transition text-sm mt-1">
                </div>
                <div class="pt-2">
                    <button type="submit" id="a-btn" class="w-full bg-indigo-600 text-white py-3.5 md:py-4 rounded-xl md:rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-700 transition active:scale-95 shadow-lg shadow-indigo-500/20 text-xs md:text-sm">
                        Masuk ke Dashboard
                    </button>
                </div>
            </form>
        </div>

    </div>

    <!-- Toast -->
    <div id="custom-toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] hidden">
        <div class="bg-black text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-xs flex items-center gap-3">
            <span id="toast-icon">🎉</span><span id="toast-msg">Login Berhasil!</span>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function switchTab(tab) {
            // Panel
            document.getElementById('panel-customer').classList.toggle('active', tab === 'customer');
            document.getElementById('panel-admin').classList.toggle('active', tab === 'admin');

            // Tombol aktif
            const cBtn = document.getElementById('tab-customer-btn');
            const aBtn = document.getElementById('tab-admin-btn');

            if (tab === 'customer') {
                cBtn.classList.add('bg-white', 'dark:bg-gray-600', 'text-indigo-600', 'dark:text-white', 'shadow-sm');
                cBtn.classList.remove('text-gray-400', 'dark:text-gray-400');
                aBtn.classList.remove('bg-white', 'dark:bg-gray-600', 'text-indigo-600', 'dark:text-white', 'shadow-sm');
                aBtn.classList.add('text-gray-400', 'dark:text-gray-400');
            } else {
                aBtn.classList.add('bg-white', 'dark:bg-gray-600', 'text-indigo-600', 'dark:text-white', 'shadow-sm');
                aBtn.classList.remove('text-gray-400', 'dark:text-gray-400');
                cBtn.classList.remove('bg-white', 'dark:bg-gray-600', 'text-indigo-600', 'dark:text-white', 'shadow-sm');
                cBtn.classList.add('text-gray-400', 'dark:text-gray-400');
            }
        }
    </script>

    <script type="module">
        import { Store } from './app.js';

        // Jika sudah login sebagai customer, redirect langsung
        const existing = Store.getUser();
        if (existing && existing.role !== 'admin') {
            const dest = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
            window.location.href = dest;
        }
        // Jika sudah login sebagai admin, redirect ke dashboard
        const existingAdmin = JSON.parse(localStorage.getItem('admin_session'));
        if (existingAdmin && existingAdmin.role === 'admin') {
            window.location.href = 'admin/index.html';
        }

        const toast = document.getElementById('custom-toast');
        function showNotif(msg, isError = false) {
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = isError ? '⚠️' : '🎉';
            toast.classList.remove('hidden');
            toast.classList.add('toast-in');
            const el = toast.firstElementChild;
            if (isError) el.classList.replace('bg-black', 'bg-red-600');
            else el.classList.replace('bg-red-600', 'bg-black');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        async function mergeGuestData() {
            const wishlist = Store.getWishlist();
            if (wishlist.length && Store.getToken()) {
                for (const item of wishlist) {
                    await Store.apiToggleWishlist(item.id).catch(() => {});
                }
            }
        }

        // ===== CUSTOMER LOGIN =====
        document.getElementById('customer-form').onsubmit = async function(e) {
            e.preventDefault();
            const email    = document.getElementById('c-email').value.trim();
            const password = document.getElementById('c-password').value.trim();
            const btn      = document.getElementById('c-btn');
            const dest     = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
            btn.innerText  = 'MOHON TUNGGU...';
            btn.disabled   = true;

            const result = await Store.apiLogin(email, password);

            if (result.ok && result.data.success) {
                const user = result.data.user;
                if (user.role === 'admin') {
                    Store.logout();
                    showNotif('Akun ini adalah Admin, gunakan tab Admin!', true);
                    btn.innerText = 'Masuk'; btn.disabled = false;
                    return;
                }
                await mergeGuestData();
                showNotif('Login Berhasil!');
                setTimeout(() => window.location.href = dest, 1200);
            } else {
                const users = JSON.parse(localStorage.getItem('users_db')) || [];
                const match = users.find(u => u.email === email && u.password === password);
                if (match && match.role !== 'admin') {
                    Store.setUser(match);
                    await mergeGuestData();
                    showNotif('Login Berhasil!');
                    setTimeout(() => window.location.href = dest, 1200);
                } else if (match && match.role === 'admin') {
                    showNotif('Akun ini adalah Admin, gunakan tab Admin!', true);
                    btn.innerText = 'Masuk'; btn.disabled = false;
                } else {
                    showNotif(result.data?.message || 'Email atau Password salah!', true);
                    btn.innerText = 'Masuk'; btn.disabled = false;
                }
            }
        };

        // ===== ADMIN LOGIN =====
        document.getElementById('admin-form').onsubmit = async function(e) {
            e.preventDefault();
            const email    = document.getElementById('a-email').value.trim();
            const password = document.getElementById('a-password').value.trim();
            const btn      = document.getElementById('a-btn');
            btn.innerText  = 'MEMVERIFIKASI...';
            btn.disabled   = true;

            // Simpan sementara isAdminContext supaya Store tahu ini admin login
            // Kita manggil API langsung tanpa Store.apiLogin karena context-nya customer page
            try {
                const res = await fetch('https://web-production-8184a.up.railway.app/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    if (data.user.role !== 'admin') {
                        showNotif('Akun ini bukan Admin!', true);
                        btn.innerText = 'Masuk ke Dashboard'; btn.disabled = false;
                        return;
                    }
                    localStorage.setItem('admin_session', JSON.stringify(data.user));
                    localStorage.setItem('admin_token', data.token);
                    showNotif('Selamat datang, Admin! 🎉');
                    setTimeout(() => window.location.href = 'admin/index.html', 1200);
                    return;
                }
            } catch(err) {
                // Server tidak aktif, fallback hardcoded
            }

            // Fallback hardcoded
            if (email === 'admin@mail.com' && password === 'admin123') {
                localStorage.setItem('admin_session', JSON.stringify({ name: 'Admin', email, role: 'admin', id: 1 }));
                localStorage.setItem('admin_token', 'local-admin-token');
                showNotif('Selamat datang, Admin! 🎉');
                setTimeout(() => window.location.href = 'admin/index.html', 1200);
            } else {
                showNotif('Email atau Password Admin salah!', true);
                btn.innerText = 'Masuk ke Dashboard'; btn.disabled = false;
            }
        };
    </script>
</body>
</html>
