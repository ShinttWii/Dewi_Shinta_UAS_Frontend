<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagVerse | Admin Login</title>
    <script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');})();</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{indigo:{600:'#4f46e5'}}}}}</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .toast-in { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn { from{transform:translate(-50%,20px);opacity:0} to{transform:translate(-50%,0);opacity:1} }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 flex items-center justify-center min-h-screen p-4 transition-colors duration-300">

    <!-- Tombol Toggle Dark Mode -->
    <button onclick="toggleTheme()" class="fixed top-4 right-4 p-2 bg-white/80 dark:bg-gray-700 rounded-xl shadow-md text-sm z-50 transition hover:scale-110 active:scale-95" title="Ganti tema">🌓</button>

    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-200/60 via-slate-100 to-slate-100 dark:from-indigo-900/40 dark:via-slate-900 dark:to-slate-900 pointer-events-none"></div>

    <div class="relative bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 backdrop-blur-xl p-6 md:p-10 rounded-[32px] md:rounded-[40px] shadow-2xl w-full max-w-[360px] md:max-w-md z-10">

        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-black text-indigo-600 dark:text-indigo-400 italic tracking-tighter cursor-pointer"
                onclick="location.href='../index.html'">BAGVERSE.</h1>
            <div class="inline-flex items-center gap-1.5 mt-3 bg-indigo-100 dark:bg-indigo-600/20 border border-indigo-300 dark:border-indigo-500/30 px-3 py-1 rounded-full">
                <span class="text-[9px]">🔒</span>
                <span class="text-[9px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-widest">Admin Dashboard</span>
            </div>
        </div>

        <form id="admin-form" class="space-y-4">
            <div>
                <label class="text-[9px] font-black text-gray-400 dark:text-white/30 ml-2 uppercase tracking-widest">Email Admin</label>
                <input type="email" id="email" required placeholder="admin@mail.com"
                    class="w-full p-3 md:p-4 rounded-xl md:rounded-2xl bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-white/20 outline-none focus:ring-2 focus:ring-indigo-500 transition text-sm mt-1">
            </div>
            <div>
                <label class="text-[9px] font-black text-gray-400 dark:text-white/30 ml-2 uppercase tracking-widest">Password</label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="w-full p-3 md:p-4 rounded-xl md:rounded-2xl bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-white/20 outline-none focus:ring-2 focus:ring-indigo-500 transition text-sm mt-1">
            </div>
            <div class="pt-2">
                <button type="submit" id="btn-text"
                    class="w-full bg-indigo-600 text-white py-3.5 md:py-4 rounded-xl md:rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-700 transition active:scale-95 shadow-lg shadow-indigo-500/30 text-xs md:text-sm">
                    Masuk ke Dashboard
                </button>
            </div>
        </form>

        <div class="mt-6 pt-5 border-t border-gray-200 dark:border-white/10 text-center">
            <a href="../login.html" class="text-[9px] font-bold text-gray-400 dark:text-white/20 hover:text-gray-600 dark:hover:text-white/50 uppercase tracking-widest transition">
                ← Kembali ke Login Customer
            </a>
        </div>
    </div>

    <div id="custom-toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] hidden">
        <div class="bg-black text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-xs flex items-center gap-3">
            <span id="toast-icon">✅</span><span id="toast-msg">Login Berhasil!</span>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
    </script>

    <script type="module">
        import { Store } from './app.js';

        // Sudah login sebagai admin → langsung ke dashboard
        const existing = Store.getUser(); // baca admin_session
        if (existing && existing.role === 'admin') window.location.href = 'index.html';

        const toast = document.getElementById('custom-toast');
        function showNotif(msg, isError = false) {
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = isError ? '⚠️' : '✅';
            toast.classList.remove('hidden');
            toast.classList.add('toast-in');
            const el = toast.firstElementChild;
            if (isError) el.classList.replace('bg-black', 'bg-red-600');
            else el.classList.replace('bg-red-600', 'bg-black');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        document.getElementById('admin-form').onsubmit = async function(e) {
            e.preventDefault();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn      = document.getElementById('btn-text');
            btn.innerText  = 'MEMVERIFIKASI...';
            btn.disabled   = true;

            const result = await Store.apiLogin(email, password);

            if (result.ok && result.data.success) {
                if (result.data.user.role !== 'admin') {
                    Store.logout();
                    showNotif('Akun ini bukan Admin!', true);
                    btn.innerText = 'Masuk ke Dashboard'; btn.disabled = false;
                    return;
                }
                showNotif('Selamat datang, Admin!');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                // Fallback hardcoded
                if (email === 'admin@mail.com' && password === 'admin123') {
                    const adminUser = { name: 'Admin', email, role: 'admin', id: 1 };
                    Store.setUser(adminUser);  // → admin_session
                    Store.setToken('local-admin-token'); // dummy token
                    showNotif('Selamat datang, Admin!');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    showNotif(result.data?.message || 'Email atau Password salah!', true);
                    btn.innerText = 'Masuk ke Dashboard'; btn.disabled = false;
                }
            }
        };
    </script>
</body>
</html>
