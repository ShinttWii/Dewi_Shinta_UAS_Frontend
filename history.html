<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagVerse | Riwayat Belanja</title>
    <script>
        (function() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { indigo: { 600: '#4f46e5' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        html.dark body { background-color: #0f172a; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 dark:text-white transition-all min-h-screen">
    
    <nav class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md sticky top-0 z-50 border-b dark:border-gray-800 shadow-sm font-bold">
        <div class="container mx-auto px-2 py-3 md:px-4 md:py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-black text-indigo-600 cursor-pointer tracking-tighter shrink-0 mr-2" onclick="location.href='index.html'">
                BAGVERSE.
            </h1>
            <div class="flex items-center gap-2 sm:gap-4 md:gap-6 text-[9px] xs:text-[10px] md:text-sm">
                <a href="index.html" class="opacity-60 hover:opacity-100 transition whitespace-nowrap">Beranda</a>
                <a href="wishlist.html" class="opacity-60 hover:opacity-100 transition"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:inline-block;vertical-align:middle;"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></a>
                <a href="history.html" class="text-indigo-600 border-b-2 border-indigo-600 whitespace-nowrap">Riwayat</a>
                <a href="cart.html" class="relative text-base md:text-xl shrink-0 ml-1">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:middle;"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> <span id="cart-count" class="absolute -top-1 -right-2 bg-red-500 text-white text-[8px] px-1 rounded-full font-bold border border-white dark:border-gray-800">0</span>
                </a>
                <div id="nav-auth" class="shrink-0"></div>
                <button onclick="toggleTheme()" class="p-1.5 md:p-2 bg-gray-100 dark:bg-gray-700 rounded-lg md:rounded-xl text-xs">🌓</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 md:py-10 max-w-2xl">
        <div class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <header class="text-center md:text-left">
                <h2 class="text-2xl md:text-3xl font-black italic uppercase tracking-tighter">Pesanan Saya</h2>
                <p class="text-[10px] opacity-50 font-bold uppercase tracking-widest">Riwayat transaksi kamu</p>
            </header>
            
           <div class="relative w-full md:w-64 group">
    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none z-10">
        <span class="text-sm opacity-30">🔍</span>
    </div>
    
    <input type="text" id="search-history" placeholder="Cari pesanan..." 
        class="w-full p-2.5 md:p-3 !pl-14 rounded-xl bg-white dark:bg-gray-800 border dark:border-gray-700 shadow-sm outline-none text-xs focus:ring-2 focus:ring-indigo-500 transition-all">
</div>
        </div>

        <div id="order-history-list" class="space-y-3 md:space-y-6"></div>
    </main>

    <script type="module">
        import { Store } from './app.js';
        Store.initTheme();

        const user = Store.getUser();
        if(!user) {
            window.location.href = 'login.html?redirect=history.html';
        }

        async function renderHistory() {
            const container = document.getElementById('order-history-list');
            const query = document.getElementById('search-history').value.toLowerCase();

            updateNav();

            // Ambil dari API dulu, fallback ke localStorage
            let myOrders = [];
            const apiRes = await Store.apiGetMyOrders();
            if (apiRes.ok && apiRes.data.data && apiRes.data.data.length) {
                myOrders = apiRes.data.data;
            } else {
                // fallback localStorage
                const allOrders = Store.getOrders();
                myOrders = allOrders.filter(o => o.userEmail === user.email);
            }

            if (query) {
                myOrders = myOrders.filter(order =>
                    order.items.some(item => item.name.toLowerCase().includes(query))
                );
            }
            myOrders.reverse();

            if(myOrders.length === 0) {
                container.innerHTML = `
                    <div class="p-10 text-center bg-white dark:bg-gray-800 rounded-[30px] border-2 border-dashed dark:border-gray-700 opacity-40">
                        <p class="text-3xl mb-2">🔍</p>
                        <p class="text-xs italic font-bold">Belum ada riwayat pesanan.</p>
                    </div>`;
                return;
            }

            const statusConfig = {
                pending:    { label: 'Menunggu',   cls: 'bg-yellow-50 text-yellow-600 dark:bg-yellow-900/20 dark:text-yellow-400' },
                processing: { label: 'Diproses',   cls: 'bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400' },
                shipped:    { label: 'Dikirim',    cls: 'bg-indigo-50 text-indigo-600 dark:bg-indigo-900/20 dark:text-indigo-400' },
                delivered:  { label: 'Selesai',    cls: 'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/20 dark:text-emerald-400' },
                cancelled:  { label: 'Dibatalkan', cls: 'bg-red-50 text-red-500 dark:bg-red-900/20 dark:text-red-400' },
                Dibayar:    { label: 'Dibayar',    cls: 'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/20 dark:text-emerald-400' },
            };

            container.innerHTML = myOrders.map(o => {
                const orderId   = o.order_id || o.orderId || o.id || '';
                const date      = o.created_at ? new Date(o.created_at).toLocaleString('id-ID') : (o.date || '');
                const items     = o.items || [];
                const shipping  = o.shipping || {};
                const shipName  = o.shipping_name || shipping.name || user.name;
                const payment   = o.payment_method || o.payment || 'Transfer';
                const total     = o.total_price || o.totalPrice || 0;
                const st        = o.status || 'pending';
                const stCfg     = statusConfig[st] || { label: st, cls: 'bg-gray-100 text-gray-500' };

                return `
                <div class="bg-white dark:bg-gray-800 p-4 md:p-7 rounded-[24px] md:rounded-[40px] border dark:border-gray-700 shadow-sm space-y-3 md:space-y-5">
                    <div class="flex justify-between items-center border-b dark:border-gray-700 pb-2.5">
                        <div>
                            <span class="text-[8px] md:text-[10px] font-black bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 px-2 py-0.5 rounded tracking-tighter">#${String(orderId).slice(-8)}</span>
                            <p class="text-[9px] opacity-50 mt-1 font-medium">${date}</p>
                        </div>
                        <span class="text-[8px] md:text-[10px] font-black px-2 py-0.5 rounded-full uppercase ${stCfg.cls}">${stCfg.label}</span>
                    </div>

                    <div class="space-y-2">
                        ${items.map(item => `
                            <div class="flex justify-between items-center text-[10px] md:text-xs">
                                <div class="flex items-center gap-2.5">
                                    <img src="${item.image||''}" onerror="this.src='https://placehold.co/100x100?text=Bag'" class="w-8 h-8 md:w-12 md:h-12 rounded-lg object-cover">
                                    <div class="max-w-[140px] md:max-w-none">
                                        <p class="font-bold truncate leading-tight">${item.name}</p>
                                        <p class="text-[8px] md:text-[10px] opacity-50">${item.qty} pcs • Rp ${Number(item.price).toLocaleString('id-ID')}</p>
                                    </div>
                                </div>
                                <span class="font-black shrink-0">Rp ${(item.price * item.qty).toLocaleString('id-ID')}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="grid grid-cols-2 gap-2 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl md:rounded-2xl border dark:border-gray-700 text-[9px] md:text-[10px]">
                        <div>
                            <p class="opacity-40 font-black uppercase mb-0.5">Tujuan</p>
                            <p class="font-bold truncate">${shipName}</p>
                        </div>
                        <div class="text-right border-l dark:border-gray-700 pl-2">
                            <p class="opacity-40 font-black uppercase mb-0.5">Metode</p>
                            <p class="font-bold uppercase">${payment}</p>
                        </div>
                    </div>

                    <div class="flex justify-between items-center pt-1">
                        <p class="text-[10px] md:text-xs font-bold opacity-40 uppercase">Total Bayar</p>
                        <p class="text-lg md:text-xl font-black text-indigo-600 tracking-tight">Rp ${Number(total).toLocaleString('id-ID')}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        function updateNav() {
            document.getElementById('cart-count').innerText = Store.getCart().length;
            const user = Store.getUser() || JSON.parse(localStorage.getItem('admin_session'));
            const navAuth = document.getElementById('nav-auth');
            if (user) {
                const initial = user.name ? user.name.charAt(0).toUpperCase() : '?';
                const logoutBtn = `<button onclick="logout()" title="Logout" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;opacity:0.7;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>`;
                if (user.role === 'admin') {
                    navAuth.innerHTML = `
                        <div class="flex items-center gap-1.5">
                            <span class="hidden md:inline" style="font-size:10px;font-weight:800;opacity:0.5;">Hi, ${user.name}</span>
                            <span class="md:hidden w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-black" style="font-size:10px;min-width:24px;">${initial}</span>
                            <a href="admin/index.html" class="bg-indigo-600 text-white px-2 py-1 rounded-md font-black" style="font-size:9px;">Dashboard</a>
                            ${logoutBtn}
                        </div>`;
                } else {
                    navAuth.innerHTML = `
                        <div class="flex items-center gap-1.5">
                            <span class="hidden md:inline" style="font-size:10px;font-weight:800;opacity:0.5;">Hi, ${user.name}</span>
                            <span class="md:hidden w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-black" style="font-size:10px;min-width:24px;">${initial}</span>
                            ${logoutBtn}
                        </div>`;
                }
            } else {
                navAuth.innerHTML = `<a href="login.html" class="bg-indigo-600 text-white px-2 py-1 rounded-md font-black" style="font-size:9px;">Login</a>`;
            }
        }

        document.getElementById('search-history').addEventListener('input', renderHistory);
        window.logout = Store.logout;
        renderHistory();
    </script>

    <div id="footer-placeholder"></div>

<script>
    // Fungsi panggil file footer eksternal
    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
</script>

</body>
</html>
